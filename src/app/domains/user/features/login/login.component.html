<app-floating-configurator />
<p-toast />
<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden py-10">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-12 px-8 sm:px-20" style="border-radius: 53px">
                <div class="text-center mb-8">
                    <app-logo />
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Welcome back</div>
                    <span class="text-muted-color font-medium">Sign in to TillTide</span>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <p-button
                        label="Sign In"
                        icon="pi pi-sign-in"
                        styleClass="w-full max-w-xs"
                        [loading]="loading"
                        (onClick)="onLogin()">
                    </p-button>
                    <p-button
                        label="Login as Employee"
                        icon="pi pi-id-card"
                        styleClass="w-full max-w-xs p-button-secondary"
                        routerLink="/user/pin">
                    </p-button>
                    <div class="text-center text-muted-color mt-4">
                        Don't have an account?
                        <a routerLink="/account/register" class="font-medium no-underline text-primary cursor-pointer">
                            Create one
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
